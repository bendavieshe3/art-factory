repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0 # Use the latest version
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/psf/black
    rev: 24.4.2 # Use the latest version
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2 # Use the latest version
    hooks:
      - id: isort
        language_version: python3.11

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.4.0 # Use the latest version
    hooks:
      - id: eslint
        additional_dependencies: ['eslint-plugin-vue']

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8 # Use the latest version
    hooks:
      - id: prettier
        files: \.(js|ts|jsx|tsx|json|md|vue|css|scss|html)$

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0 # Use the latest version
    hooks:
      - id: flake8
        additional_dependencies:
          ['flake8-bugbear', 'flake8-comprehensions', 'mccabe']
        language_version: python3.11
