<!DOCTYPE html>
<html>
<head>
    <title>Warehouse List</title>
</head>
<body>
    <h1>Warehouse List</h1>
    <ul>
        {% for warehouse in warehouses %}

        {% endfor %}
    </ul>
</body>
</html>
